repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: no-go-testing
      - id: golangci-lint
  # Local hook replaces the upstream go-unit-tests which hard-codes a
  # 30s timeout (too short for property-based tests on cold cache) and
  # uses -v (produces enormous race-detector noise from go-fuse).
  - repo: local
    hooks:
      - id: go-unit-tests
        name: go unit tests
        entry: go test -short -timeout 120s -count=1 ./...
        language: system
        pass_filenames: false
        types: [go]
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
