name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. "v0.1.0", "v1.0.0-rc1")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Ensure annotated tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/release-ensure-annotated.sh "$RELEASE_TAG"

      - name: Find previous tag
        id: prev
        run: .github/scripts/release-find-previous.sh "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/release-create.sh "$RELEASE_TAG" "proton-utils" "${{ steps.prev.outputs.tag }}"
